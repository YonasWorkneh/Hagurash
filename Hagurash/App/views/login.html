<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../Resources/CSS/login.css">
  <link rel="icon" type="image/png" href="../../Resources/Images/favicon.png">
  <title>LogIn Page</title>
</head>
<body>
    
      <form action="">
        <fieldset>
          <img src="../../Resources/Images/Logo.png" alt="Hagurash logo.png">
          <h1>Sign Up</h1>
          <input type="text" name="" id=""placeholder="Name" maxlength="30"required>
          <input type="email" name="" id=""placeholder="Email">
          <input type="password" name="" id="" minlength="6" maxlength="12"placeholder="Password"required>
          <input type="submit" value="Sign-Up"class="sign">
          <p>Already have an account? <span><a href="">Sign in</a></span></p>
        </fieldset>
      </form>
  
</body>
</html>
